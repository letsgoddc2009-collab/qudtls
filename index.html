 lang="ko">
<head><!DOCTYPE html>
<
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한민국 인구 변화 시뮬레이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Interhtml', sans-serif; background-color: #f8fafc; }
        .chart-container { position: relative; height: 400px; width: 100%; }
        .milestone-card { transition: all 0.3s ease; }
        .milestone-active { border-left: 4px solid #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">대한민국 인구 변화 시뮬레이션 (1950 - 2020)</h1>
            <p class="text-slate-600">전쟁의 폐허에서 선진국에 이르기까지의 인구 통계학적 여정</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 시뮬레이션 컨트롤 및 그래프 -->
            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-6">
                    <div class="text-2xl font-bold text-blue-600" id="currentYearDisplay">연도: 1950년</div>
                    <div class="flex gap-2">
                        <button id="playBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                            <span id="playIcon">▶</span> 재생
                        </button>
                        <button id="resetBtn" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 transition">초기화</button>
                    </div>
                </div>

                <div class="chart-container mb-6">
                    <canvas id="popChart"></canvas>
                </div>

                <div class="grid grid-cols-2 gap-4 text-center">
                    <div class="p-4 bg-slate-50 rounded-xl">
                        <div class="text-sm text-slate-500 mb-1">총 인구수</div>
                        <div class="text-xl font-bold text-slate-800" id="popValue">19,211,000명</div>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-xl">
                        <div class="text-sm text-slate-500 mb-1">연평균 성장률</div>
                        <div class="text-xl font-bold text-slate-800" id="growthValue">- %</div>
                    </div>
                </div>
            </div>

            <!-- 타임라인 및 설명 -->
            <div class="space-y-4">
                <h3 class="text-lg font-semibold text-slate-800 mb-2">주요 역사적 변곡점</h3>
                <div id="milestones" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                    <!-- Milestones will be injected here -->
                </div>
            </div>
        </div>

        <footer class="mt-12 pt-6 border-t border-slate-200 text-center text-slate-400 text-sm">
            <p>데이터 출처: UN World Population Prospects & 대한민국 통계청(KOSTAT)</p>
        </footer>
    </div>

    <script>
        // 데이터 정의 (1950-2020, 5년 단위 및 주요 변곡점 포함)
        const rawData = [
            { year: 1950, pop: 19211, label: "한국 전쟁 발발" },
            { year: 1955, pop: 21502, label: "전후 베이비붐 시작" },
            { year: 1960, pop: 25012, label: "경제개발 5개년 계획 준비" },
            { year: 1965, pop: 28705, label: "가족계획 사업 추진" },
            { year: 1970, pop: 32241, label: "새마을 운동 시작" },
            { year: 1975, pop: 35281, label: "산업화 가속도" },
            { year: 1980, pop: 38124, label: "인구 3,800만 돌파" },
            { year: 1985, pop: 40806, label: "산아제한 정책 정점" },
            { year: 1990, pop: 42869, label: "도시화율 급증" },
            { year: 1995, pop: 45093, label: "선진국 진입기" },
            { year: 2000, pop: 47008, label: "저출산 고령사회 진입" },
            { year: 2005, pop: 48138, label: "합계출산율 급락 시작" },
            { year: 2010, pop: 49554, label: "인구 5,000만 육박" },
            { year: 2015, pop: 51015, label: "생산연령인구 정점" },
            { year: 2020, pop: 51829, label: "인구 자연감소(데드크로스) 임박" }
        ];

        const milestones = [
            { year: 1950, title: "1950: 한국 전쟁", desc: "전쟁으로 인한 인구 손실과 이동이 극심했던 시기." },
            { year: 1955, title: "1955: 베이비붐의 시작", desc: "전후 사회 안정과 함께 출생아 수가 급격히 증가." },
            { year: 1965, title: "1960s: 가족계획 사업", desc: "'덮어놓고 낳다 보면 거지꼴을 못 면한다' - 정부의 강력한 산아 제한." },
            { year: 1983, title: "1983: 대체출산율 미달", desc: "출산율이 인구 유지를 위한 2.1명 아래로 처음 하락." },
            { year: 2000, title: "2000: 고령화 사회 진입", desc: "65세 이상 인구 비율이 7%를 넘어서며 고령화 시작." },
            { year: 2017, title: "2017: 고령사회 진입", desc: "65세 이상 비율 14% 돌파. 인구 구조의 급격한 변화." },
            { year: 2020, title: "2020: 데드크로스 발생", desc: "사망자 수가 출생아 수보다 많아지는 자연 감소 시작." }
        ];

        let chart;
        let currentIndex = 0;
        let isPlaying = false;
        let timer;

        function initChart() {
            const ctx = document.getElementById('popChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [rawData[0].year],
                    datasets: [{
                        label: '대한민국 인구 (천 명)',
                        data: [rawData[0].pop],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#3b82f6'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: 15000,
                            max: 55000,
                            title: { display: true, text: '인구수 (단위: 천 명)' }
                        },
                        x: {
                            title: { display: true, text: '연도' }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function renderMilestones() {
            const container = document.getElementById('milestones');
            milestones.forEach(m => {
                const div = document.createElement('div');
                div.id = `ms-${m.year}`;
                div.className = 'milestone-card p-4 bg-white rounded-xl border border-slate-100 shadow-sm';
                div.innerHTML = `
                    <div class="font-bold text-slate-800">${m.title}</div>
                    <div class="text-sm text-slate-600 mt-1">${m.desc}</div>
                `;
                container.appendChild(div);
            });
        }

        function updateUI(index) {
            const data = rawData[index];
            document.getElementById('currentYearDisplay').innerText = `연도: ${data.year}년`;
            document.getElementById('popValue').innerText = `${data.pop.toLocaleString()},000명`;
            
            if (index > 0) {
                const prevPop = rawData[index-1].pop;
                const growth = (((data.pop - prevPop) / prevPop) * 100 / 5).toFixed(2);
                document.getElementById('growthValue').innerText = `${growth}% (연평균)`;
            } else {
                document.getElementById('growthValue').innerText = `- %`;
            }

            // 하이라이트 타임라인
            milestones.forEach(m => {
                const el = document.getElementById(`ms-${m.year}`);
                if (el) {
                    if (data.year >= m.year) {
                        el.classList.add('milestone-active');
                    } else {
                        el.classList.remove('milestone-active');
                    }
                }
            });

            // 차트 업데이트
            chart.data.labels = rawData.slice(0, index + 1).map(d => d.year);
            chart.data.datasets[0].data = rawData.slice(0, index + 1).map(d => d.pop);
            chart.update('none');
        }

        function play() {
            if (currentIndex >= rawData.length - 1) {
                currentIndex = 0;
            }
            isPlaying = true;
            document.getElementById('playIcon').innerText = '⏸';
            document.getElementById('playBtn').classList.replace('bg-blue-600', 'bg-amber-500');

            timer = setInterval(() => {
                currentIndex++;
                updateUI(currentIndex);
                if (currentIndex >= rawData.length - 1) {
                    stop();
                }
            }, 800);
        }

        function stop() {
            isPlaying = false;
            clearInterval(timer);
            document.getElementById('playIcon').innerText = '▶';
            document.getElementById('playBtn').classList.replace('bg-amber-500', 'bg-blue-600');
        }

        document.getElementById('playBtn').addEventListener('click', () => {
            if (isPlaying) stop();
            else play();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            stop();
            currentIndex = 0;
            updateUI(0);
        });

        window.onload = () => {
            initChart();
            renderMilestones();
            updateUI(0);
        };
    </script>
</body>
</html>
